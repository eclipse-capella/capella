#Properties file for org.polarsys.capella.core.projection.interfaces
providerName = Eclipse.org
pluginName = Interface Transfo Plug-in

generateInterfaces_label=Interfaces from Allocated Functions
generateInterfaceDelegationsLA_label=Synchronize Interfaces with System Analysis
generateInterfaceDelegationsSA_label=Synchronize Logical System Interfaces

constraint.name = DWF_I_23 - Missing/Unused Exchange Items on generated Interfaces
constraint.message = message is generated dynamically
constraint.description = This rule produces Errors for missing or unused Exchange Items on Interfaces generated by the "Interfaces from allocated Functions" modelling accelerator. In this context, an Exchange Item is unused on an Interface, if it is not allocated to any of the Interfaces related Functional or Component Exchanges. An Exchange Item is missing on an Interface if it is allocated on at least one of the Interfaces related Functional or Component Exchanges but not present on the Interface.