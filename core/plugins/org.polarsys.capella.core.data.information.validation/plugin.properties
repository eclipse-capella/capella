#Properties file for org.polarsys.capella.core.data.information.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = TC_DC_01 - Port Allocation
constraint.message = A PortAllocation between a ComponentPort and a FunctionPort realizing a PortAllocation from a previous phase should be consistent with the realized PortAllocation.
constraint.description = This rule ensures consistency for a port allocation between a ComponentPort and a Functional Port realizing a port allocation from a previous level.\nThe ComponentPort should realize the ComponentPort of the realized PortAllocation or should be a delegated port of the realizing port.\nThe FunctionPort should be defined in a function or a sub-function realizing the function containing the port which has been realized.

constraint.name.0 = TC_DC_02 - Port Realization
constraint.message.0 = Allocation consistency error for {0} (Role).
constraint.description.0 = This rule checks the port realizations consistency.

constraint.name.1 = TC_I_01 - ExchangeItem mechanism realization check
constraint.message.1 = {0} (ExchangeItem) realizes a ExchangeItem from a previous level. It should have same mechanism than realized ExchangeItem.
constraint.description.1 = This rule checks that an ExchangeItem realizing an ExchangeItem has the same mechanism than the realized ExchangeItem.

constraint.name.2 = TC_I_02 - Exchange item element Type realization check
constraint.message.2 = The {1} (Type) is defined into {2} level and realized into the {3} level. {0} ExchangeItemElement is typed by {1} Type instead of be typed by realized Type.
constraint.description.2 = This rule checks that an ExchangeItemElement isn't linked to a Type from a previous level whereas it is realized in the same level than the ExchangeItemElement. ExchangeItemElement should be linked to the realized Type.\nA warning can be raised if you have performed a transition of the ExchangeItemElement before performing a transition of the linked Type.\nYou should perform another transition of the ExchangeItemElement from the lower level to use the realized Type

constraint.name.3 = TC_I_06 - PA ExchangeItem restriction on UNSET exchangeMechanism
constraint.message.3 = The {0} (ExchangeItem) must not have an UNSET Exchange Mechanism.
constraint.description.3 = This rule checks that an ExchangeItem's ExchangeMechanism is not UNSET.\n\nRule is only applicable for ExchangeItem's of PA Layer and ExchangeItem's of other layers if referred by any elements of PA Layer\n\n*PA=Physical Architecture

constraint.name.4 = TC_I_07 - OA ExchangeItem restriction on UNSET exchangeMechanism
constraint.message.4 = The {0} (ExchangeItem) must not have an UNSET Exchange Mechanism.
constraint.description.4 = This rule checks that an ExchangeItem's ExchangeMechanism is not UNSET.\n\nRule is only applicable for all ExchangeItem of Operational Analysis Layer.

constraint.name.5 = TC_I_08 - SA ExchangeItem restriction on UNSET exchangeMechanism
constraint.message.5 = The {0} (ExchangeItem) must not have an UNSET Exchange Mechanism.
constraint.description.5 = This rule checks that an ExchangeItem's ExchangeMechanism is not UNSET.\n\nRule is only applicable for all ExchangeItem of System Analysis Layer.

constraint.name.6 = TC_I_09 - LA ExchangeItem restriction on UNSET exchangeMechanism
constraint.message.6 = The {0} (ExchangeItem) must not have an UNSET Exchange Mechanism.
constraint.description.6 = This rule checks that an ExchangeItem's ExchangeMechanism is not UNSET.\n\nRule is only applicable for all ExchangeItem of Logical Architecture Layer.

constraint.name.7 = TC_I_10 - EPBS ExchangeItem restriction on UNSET exchangeMechanism
constraint.message.7 = The {0} (ExchangeItem) must not have an UNSET Exchange Mechanism.
constraint.description.7 = This rule checks that an ExchangeItem's ExchangeMechanism is not UNSET.\n\nRule is only applicable for all ExchangeItem of EPBS Architecture Layer.

constraint.name.8 = TC_I_11 - Exchange Items with an inheritance relationship have the same exchange mechanism
constraint.message.8 = {0} (ExchangeItem) must have the same Exchange Mechanism of {1} (ExchangeItem) since it inherits from it.
constraint.description.8 = This rule checks that Exchange Items with an inheritance relationship have the same exchange mechanism.

constraint.name.9 = TC_I_12 - Inheritance Constraint for Exchange Item Element
constraint.message.9 = Inheritance rule between Exchange Item Elements of Exchange Item hierarchy is violated for {0} ({1}).
constraint.description.9 = This rule checks that an Exchange Item (EI 2) with Exchange Item Element (EIE 2) of Type T2, which inherits from an Exchange Item EI (EI 1) with an Exchange Item Element (EIE 1) of Type T1,verifies that T2 inherits from T1.

constraint.name.10 = TC_I_13 - Inheritance Constraint for Exchange Item Element
constraint.message.10 = Inheritance rule between Exchange Item Elements of Exchange Item hierarchy is violated for {0} ({1}).
constraint.description.10 = This rule checks that two exchange items involved in an inheritance relationship must define an exchange item element.

constraint.name.11 = I_01 - Unnamed Association
constraint.message.11 = {0} does not have a name.
constraint.description.11 = This rule ensures that an association has a name.

constraint.name.12 = I_02 - Naming conflicts check 2
constraint.message.12 = {0}"{1}" content has a naming conflict for: {2}.
constraint.description.12 = NOTE: This constraint is replaced by"I_19 - Name conflict" and thus disabled by default.\n\nThis rule checks that an element doesn't contain a naming conflict between different types of elements in the same package.

constraint.name.13 = DWF_D_01 - Union qualifier integrity 
constraint.message.13 = {0}(UnionProperty) of {1} (Union) should have at least one qualifier.
constraint.description.13 = This rule ensures that every union property of an union (except discriminant and default property) has at least one qualifier.

constraint.name.14 = DWF_D_02 - Union qualifier cardinality
constraint.message.14 = {0} (UnionProperty) has a qualifier {2} (DataValue) which is also used as a qualifier by another union property of {1} (Union) .
constraint.description.14 = This rule checks that a data value used as a qualifier for a union property cannot be used as a qualifier of another union property of the same union.

constraint.name.15 = DWF_D_03 - Discriminant Union Property Qualifier
constraint.message.15 = {0}(Union Property) is the discriminant of {1}(Union), it should not be associated with a qualifier.
constraint.description.15 = This rule ensures that the discriminant of an union do not have any qualifier.

constraint.name.16 = DWF_D_04 - Composition Cardinality Rule
constraint.message.16 = An {0}(Association) of Kind Composition  source {1}(Property) has {2}(Cardinality) instead of {3}(Cardinality) value.
constraint.description.16 = This rule checks that the cardinality of a source Class is  0..1 or 1..1 for an Association of Composition kind.

constraint.name.17 = DWF_D_05 - Association Ends IsPrimitive check
constraint.message.17 = {0} (Association) members {1}(Classifier) should not be of type primitive
constraint.description.17 = This rule checks that the Association Ends are not primitive

constraint.name.18 = DWF_D_06 - Property isPrimitive type check
constraint.message.18 = {0}(Property) should not be typed by a non primitive type {1}({2})
constraint.description.18 = This rule checks that the properties are of primitive type  if there is no bound to an Association. This rule does nothing  if a parent of a property is primitive.

constraint.name.19 = DWF_D_08 - Union Discriminant
constraint.message.19 = {0}(Union) should have a discriminant value.
constraint.description.19 = This rule ensures that Union has a discriminant.

constraint.name.20 = DWF_D_10 - Aggregation/Composition navigability check
constraint.message.20 = {0} (Property) should be a navigable member of {1} (Association).
constraint.description.20 = This rule checks that an Aggregation/Composition is navigable.

constraint.name.21 = DWF_D_11 - Association member AggregationKind check
constraint.message.21 = {0} (Association) should contain at least one member with AggregationKind=ASSOCIATION.
constraint.description.21 = This rule checks that an Association contains at least one member with AggregationKind=ASSOCIATION.

constraint.name.22 = DWF_D_12 - Property type check
constraint.message.22 = {0} (Property) is not typed.
constraint.description.22 = This rule checks that the property is typed.

constraint.name.23 = DWF_D_13 - Consistency of Qualifier values
constraint.message.23 = Qualifier nature  {0}({1}) of  {2}(UnionProperty) is not compatible with the nature of the Discriminant Type ({3}).
constraint.description.23 = This rule ensures that the values used as qualifiers of Union Properties are consistent with the Discriminant of the Union.

constraint.name.24 = DWF_D_14 - Association members check
constraint.message.24 = {0} (Association) should have at least two members.
constraint.description.24 = This test checks that an Association has at least two members.

constraint.name.25 = DWF_D_15 - Class self generalization
constraint.message.25 = {0} (Class) generalizes itself.
constraint.description.25 = This rule checks that a Class cannot generalize itself.

constraint.name.26 = DWF_D_16 - Class cycles check (inner package)
constraint.message.26 = Package {0} contains {1} class dependency cycle(s).
constraint.description.26 = This rule checks whether some cycles between classes (through association or generalization) exist.

constraint.name.27 = DWF_D_17 - Union Discriminant Data Value
constraint.message.27 = {0}(Union) should have an Union Discriminant Data Value.
constraint.description.27 = This rule ensures that a data value of the discriminant type shall be used at least once as a qualifier for the union property(which is not the discriminant).

constraint.name.28 = DWF_D_18 - Collection type check
constraint.message.28 = {0} (Collection) is not typed.
constraint.description.28 = This rule checks that a collection is typed.

constraint.name.29 = DWF_D_29 - Association members AggregationKind check 2
constraint.message.29 = {0} (Association) members {1} should not contain AggregationKind=UNSET.
constraint.description.29 = This rule ensures that an Association should not contains member with AggregationKind=UNSET.

constraint.name.30 = DWF_D_32 - Collection Value Family Type check
constraint.message.30 = "{0}" (DataValue) referenced as {1} should be typed.
constraint.description.30 = This rule ensures that CollectionValueReference is Typed.

constraint.name.31 = DWF_D_38 - Association Target Class Property key value check
constraint.message.31 = {0} (Association Property) of kind ASSOCIATION can only exist, if and only if the target class has or inherits at least one property being a part of key.
constraint.description.31 = This rule checks that an Association Property of kind ASSOCIATION can only exist, if and only if the target class has or inherits at least one property being a part of key.

constraint.name.32 = DWF_D_40 - Association Consistency between layers
constraint.message.32 = {0} (Association) should not associate {1} ({2}) of lower Architecture layer.
constraint.description.32 = This rule ensures that an Association from given layer should not associate with elements of lower Architecture layer.\n\nExample:\nIf an Association is on SystemArchitecture layer. It should not associate with any elements from Logical or Physical Layer.

constraint.name.33 = DWF_D_43 - Exchange Item Element Parameter Direction consistency
constraint.message.33 = {0}
constraint.description.33 = - for an Exchange Item with anything but an Operation Exchange Mechanism, the inner Exchange Item Element shall NOT have a parameter direction set\n  and\n - in case of an Exchange Item Operation Exchange Mechanism, all inner Exchanges Items Elements shall have a parameter direction set

constraint.name.34 = DWF_D_45 - Class Association End Constraints
constraint.message.34 = Association Role {0} (Property) of {1} (Association) is not typed
constraint.description.34 = This rule checks that class relationships (e.g. association) between classes has valid source and target

constraint.name.35 = DWF_D_46 - Association Container Check
constraint.message.35 = {0} (Association) should be in the package {1} (AssociationPkg)
constraint.description.35 = This rule ensures that an Association is in its correct container:\n- Unidirectional associations are stored in their source class containers\n- Bidirectional and nondirectional association are stored in common ancestor of their source and target classes.

constraint.name.36 = DWF_D_49 - Key Parts Cardinality Rule
constraint.message.36 = Value of maximum cardinality must be set to 1 in {0} for property/role {1} (property/role is part of key)
constraint.description.36 = In a class, when a property or an association role is part of key, value of maximum cardinality must be equal to one.

constraint.name.37 = DWF_D_50 - Max Cardinality Is A Natural
constraint.message.37 = Value of maximum cardinality, unless abstract, must eval to a natural number in {0} for property/role/element {1}
constraint.description.37 = In class property, association role and exchange item element, maximum cardinality value is defined and, unless abstract, evals to a value in [1, *[

constraint.name.38 = DWF_D_51 - Min Cardinality Is A Natural Or Zero
constraint.message.38 = Value of minimum cardinality, unless abstract, must be eval 0 or a natural number in {0} for property/role/element {1}
constraint.description.38 = In class property, association role and exchange item element minimum cardinality value is defined and, unless abstract, evals to a natural or zero (i.e. integer belonging to [0, *[)

constraint.name.39 = DWF_D_52 - Type Of Default And Null Value For Property
constraint.message.39 = Type of {0} value of property ({1}) in class {2} is inconsistent with its type.
constraint.description.39 = For a property, type of the default (resp. null) value shall be Undefined (implicit typing) or the property\u2019s datatype or a super type of the property\u2019s datatype

constraint.name.40 = DWF_D_53 - Property Or Role Overriding Is Not Allowed
constraint.message.40 = In class {0} property {1} has a same name as a property of super class {2}.
constraint.description.40 = A property/role in a class shall not have the same name as a property/role of a super-class

constraint.name.41 = DWF_D_54 - Property Or Role Respects Covariance
constraint.message.41 = In class {0} property {1} overrides that of super class {2} with a wrong type.
constraint.description.41 = If class K inherits class C, if property or association role is owned by C with type/class A and redefined in K with type/class B, then B inherits (or is equal to) A.

constraint.name.42 = DWF_I_01 - ExchangeItemParameter kind consistency
constraint.message.42 = {0}(ExchangeItem) of kind [{1}] can only have {2}(ExchangeItemElement) of kind [{3}].
constraint.description.42 = This rule checks whether the ExchangeItemElements of an ExchangeItem are consistent with applied exchange mechanism:\n- Elements of an ExchangeItem with exchange mechanism OPERATION must be of kind PARAMETER\n- For all other exchange mechanisms, elements must be of kind TYPE

constraint.name.43 = DWF_D_26 - LiteralBooleanValuel Type
constraint.message.43 = {0}(EnumerationLiteral) must be typed by its parent {1}(BooleanType).
constraint.description.43 = This rule ensures that LiteralBooleanValue is typed by its parent BooleanType.

constraint.name.44 = DWF_D_28 - DataValue Reference check
constraint.message.44 = {0}({1}) referenced value is not named.
constraint.description.44 = This rule ensures that DataValue Reference referenced value is named.

constraint.name.45 = DWF_D_30 - Boolean Value Family Type check
constraint.message.45 = "{0}" (DataValue) referenced as {1} should be typed.
constraint.description.45 = This rule ensures that LiteralBooleanValue and BooleanReference are Typed.

constraint.name.46 = DWF_D_35 - Enumeration Value Family Type check
constraint.message.46 = "{0}" (DataValue) referenced as {1} should be typed.
constraint.description.46 = This rule enforces that EnumerationReference elements are Typed.

constraint.name.47 = DWF_D_33 - String Value Family Type check
constraint.message.47 = "{0}" (DataValue) referenced as {1} should be typed.
constraint.description.47 = This rule ensures that LiteralStringValue and StringReference are Typed.

constraint.name.48 = DWF_D_34 - Complex Value Family Type check
constraint.message.48 = "{0}" (DataValue) referenced as {1} should be typed.
constraint.description.48 = This rule ensures that ComplexValue and ComplexValueReference are Typed.

constraint.name.49 = DWF_D_36 - Numeric Value Family Type check
constraint.message.49 = "{0}" (DataValue) referenced as {1} should be typed.
constraint.description.49 = This rule ensures that LiteralNumericValue and NumericReference are Typed.

constraint.name.50 = DWF_D_37 - Expression Value Family Type check
constraint.message.50 = "{0}" (DataValue) referenced as {1} should be typed.
constraint.description.50 = This rule ensures that BinaryExpression and UnaryExpression are Typed.

constraint.name.51 = DWF_D_39 - Data Value Name Check
constraint.message.51 = {0}
constraint.description.51 = This rule ensures that a data value defined directly in its name space (class, datatype, package) have a name.

constraint.name.52 = DWF_D_56 - EnumerationLiteral Type check
constraint.message.52 = "{0}" (EnumerationLiteral) with current type {1} should be typed by its parent {2}.
constraint.description.52 = This rule enforces that EnumerationLiteral elements are typed by their parent.

constraint.name.53 = DWF_D_44 - Enumeration Literals Domain Values Constraints
constraint.message.53 = Enumeration literals  of {0}(Enumeration) must have a domain value in concordance with the domain type of the parent enumeration {0}(Enumeration): {0}(Enumeration) is {1}, {2}
constraint.description.53 = This rule ensures that enumeration literals domain values are typed according to the type of their container enumeration domain type.

constraint.name.54 = DWF_D_57 - DataValue Containing Feature
constraint.message.54 = {0} ({1}) is aggregated in ownedDataValues feature of {2} ({3}) instead of ownedLiterals feature.
constraint.description.54 = This rule checks that the EnumerationLiteral and the LiteralBooleanValue are aggregated in the ownedLiterals feature of the Enumeration or the BooleanType and not in the ownedDataValues feature.

constraint.name.55 = DC_CL_01  Communication Link is delegated by one subcomponent at least
constraint.message.55 = Communication Link {0} from {1} (Component) to {2} (ExchangeItem) is not delegated by one of its sub-components.
constraint.description.55 = Model Validation\u00A0shall check that Exchange Items referenced by a Communication Link is delegated to one or many subcomponents of the source Component.

constraint.name.56 = DC_CL_02 Communication Link for a component is defined in its parent
constraint.message.56 = Communication Link {0} from {1} (Component) to {2} (ExchangeItem) must be also defined in the following parents of this component : {3}.
constraint.description.56 = Model Validation\u00A0shall check that an Exchange Item referenced by a Communication Link from a SubComponent is also referenced by a Communication Link from owning Components.