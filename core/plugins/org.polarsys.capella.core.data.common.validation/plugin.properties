#Properties file for org.polarsys.capella.core.data.common.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = TC_SM_01 - StateTransition Realization
constraint.message = {0} (StateTransition) realizes a StateTransition from a previous level. It should be consistent with the realized StateTransition.
constraint.description = This rule checks that a StateTransition realizing a StateTransition from a previous level is consistent with the realized StateTransition and the Bounds of the StateTransition realize both bounds of the realized StateTransition.

constraint.name.0 = TC_SM_02 -  A Region shall have only one Shallow/Deep History State
constraint.message.0 = Region {0} has two history states of the same type.
constraint.description.0 = This rule check that region have unique history state.

constraint.name.1 = DWF_SM_04 - A decision or a fork must have only one entering transition
constraint.message.1 = {0} ({1}) must only have one incoming transition.
constraint.description.1 = This rule checks that a decision or a fork have only one entering transition.

constraint.name.2 = DWF_SM_05 - A join connector must have only one outgoing transition
constraint.message.2 = the {0} ({1}) must have only one outgoing transition
constraint.description.2 = This rule checks that a join connector have only one outgoing transition.

constraint.name.3 = DWF_SM_01 - A state machine must have only one initial state
constraint.message.3 = {0} (StateMachine) have more than one initial state.
constraint.description.3 = This rule checks that a state machine have only one initial state

constraint.name.4 = DWF_SM_02 - An initial state must have only one outgoing transition
constraint.message.4 = {0} ({1}) have more than one outgoing transition
constraint.description.4 = This rule checks that an initial state have only one outgoing transition.

constraint.name.5 = DWF_SM_03 - Referenced states of a state must be all involved states in its subregions
constraint.message.5 = The State/Mode {0} have an incoherent involvedStates list.
constraint.description.5 = This rule checks that referenced  States in a State are the sum of all involved States of sub regions.

constraint.name.6 = DWF_SM_06 - Mode and State should'nt be in same hierarchy
constraint.message.6 = {1} ({0}) has at least a {2} in his hierarchy.
constraint.description.6 = This rule depends on the Preference option"Mode/State mixed hierarchy allowed". If this option is set to false, the rule checks that  a state is not in a mode hierarchy or a mode is not in a state hierarchy. In this case, hierarchy includes siblings.

constraint.name.7 = DWF_SM_16 - Mode and State can not be mixed in the same State Machine
constraint.message.7 = {0} (StateMachine) has mixed Modes and States.
constraint.description.7 = This rule depends on the Preference option"Mode/State mixed hierarchy allowed". If this option is set to false, the rule checks that a State Machine has no mixed States and Modes.

constraint.name.8 = DWF_SM_07 - Fork and Join State must be used in the context of concurrent Region
constraint.message.8 = {0} {1} {2} transitions must be in different region of the same state/mode.
constraint.description.8 = This rule ensure that Join/Fork states are used in concurrent region context.

constraint.name.9 = DWF_SM_08 - State must reference a function with doActivity/entry/exit related with its owning component
constraint.message.9 = {0} of {2} shall not reference functions ({1}) which are not allocated on the component owning the state Machine ({3}) or one of its subcomponents.
constraint.description.9 = This rule check if doActivity/Entry/Exit reference only functions associated to the component owning the state Machine or allocated to one of its subcomponents.

constraint.name.10 = DWF_SM_09 - StateTransitions trigger shall not reference unallocated Functions or Functional Exchanges  and be consistent with business query.
constraint.message.10 = StateTransiton to {0} is triggered by an element which is not referencable ({1}).
constraint.description.10 = This rule check that Functions or Functional Exchanges which triggers the StateTransition are allocated on the Component or one of its subcomponents.

constraint.name.11 = DWF_SM_10 - StateTransition source and target shouldn't be stored in concurrent region
constraint.message.11 = [StateTransiton] to {0} has its source and target stored in concurrent region.
constraint.description.11 = This rule check that source and target of StateTransition are not stored in concurrent region.

constraint.name.12 = DWF_SM_11 -  EntryPoint must have only one outgoing transition and one or more incoming transition
constraint.message.12 = EntryPoint {0} has not a single outgoing transition or has no incoming transition.
constraint.description.12 = This rule check that EntryPoint have only one outgoing transition and one or more incoming transition.

constraint.name.13 = DWF_SM_12 - ExitPoint must have only one incoming transition and one or more outgoing transition
constraint.message.13 = ExitPoint {0} has not a single incoming transition or has no outgoing transition.
constraint.description.13 = This rule check that ExitPoint have only one incoming transition and one or more outgoing transition.

constraint.name.14 = DWF_SM_13 - Shallow/Deep History shall have only incoming transitions
constraint.message.14 = {0} {1} has outgoing transitions.
constraint.description.14 = This rule check that Shallow/Deep History state has only incoming transitions.

constraint.name.15 = DWF_SM_14 - Functions referenced in a State must be referened as available in this State.
constraint.message.15 = {0} reference ({1}) that must be referenced as Operational Activities/Functions in {2}.
constraint.description.15 = This rule check that Functions referenced as DoActivity, Entry or Exit of a Mode/State are available via the Operational Activities/Functions reference of this State.

constraint.name.16 = DWF_SM_15 - Mode and State shouldn't reuse each other
constraint.message.16 = {1} ({0}) reuses at least a {2}.
constraint.description.16 = This rule depends on the Preference option"Mode/State mixed hierarchy allowed". If this option is set to false, the rule checks that a state does not reuse a mode or a mode does not reuse a state.

constraint.name.17 = I_03 - Check existence of referenced libraries
constraint.message.17 = Referenced library {0} does not exist.
constraint.description.17 = This rule checks that referenced libraries exist for a given Project.

constraint.name.18 = I_44 - Check existence of unknown model features
constraint.message.18 = {0} [{1}] has an unknown feature [{2}] of value [{3}].
constraint.description.18 = This rule checks the existence of unkown model features. \nAn unkown model feature is a feature that is persisted in your textual model representation, but is not recognised by the metamodel and therefore is not loaded during model opening.\nIts existence does not add any corruption risk to your model, but it does represent an anomaly so it should be removed.