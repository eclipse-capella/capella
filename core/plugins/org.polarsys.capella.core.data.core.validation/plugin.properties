#Properties file for org.polarsys.capella.core.data.core.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = DWF_D_19 - Class Multiple Inheritance
constraint.message = {0} ({1}) should not inherit from multiple class or component
constraint.description = This rule checks that a Class (or a Component) cannot inherit from multiple classes (resp. Components) if the dedicated configuration option does not allow it.

constraint.name.0 = DWF_D_41 - Class with an abstract attribute/role
constraint.message.0 = {0} with an abstract {1} {2} shall be abstract.
constraint.description.0 = This rule chekcs if a class has an abstract attribute or a abstract role of an association on the navigable side, the class shall be abstract.

constraint.name.1 = DWF_D_47 - Final Inheritance
constraint.message.1 = {0} have a Final Inheritance ({1}).
constraint.description.1 = This rule ensures that superTypes are not Final.

constraint.name.2 = DWF_D_55 [Live] - Validate Data Pkg Dependency Cycle
constraint.message.2 = DWF_D_55 [Live]: Some dependency cycle(s) has(ve) been detected that implies the following packages: {0}
constraint.description.2 = This rule detects Cycle of Dependencies between Data packages.

constraint.name.3 = DWF_D_58 - Constraint should constrain the Component
constraint.message.3 = {0}: ConstrainedElements value should not be {1}.
constraint.description.3 = In monopart mode: This rule ensures that ConstrainedElements value is not Part/PartDeploymentLink.

constraint.name.4 = DWF_D_59 - Constraint should be located under Component
constraint.message.4 = {0}should be located under {1}.
constraint.description.4 = In monopart mode: This rule ensures that a constraint is not stored under and have ConstrainedElements values as a Part/PartDeploymentLink.\nException : In EPBS Layer constraint's can be stored under Part.\n\nIn multipart mode : This rule ensures that a constraint is not stored under PartDeploymentlink.\nException : If first ConstraintElements value is container PartDeploymentlink or empty ConstraintElements value.

constraint.name.5 = Q_01 - Mandatory summaries
constraint.message.5 = {1} ({0})  doesn't have a summary
constraint.description.5 = This rule checks that Functions, Components, Actors, Functional Exchanges and Component Exchanges must have a summary.

constraint.name.6 = Q_02 - Mandatory descriptions
constraint.message.6 = {1} ({0})  doesn't have a description
constraint.description.6 = This rule checks that Functions, Components, Actors, Functional Exchanges and Component Exchanges have a description.

constraint.name.7 = Q_03 - Review Field Not Empty
constraint.message.7 = {0}
constraint.description.7 = This rule ensures that review field of an element is always empty.

constraint.name.8 = I_08 - Naming conflicts check 1
constraint.message.8 = {0}"{1}" content has a naming conflict for: {2}.
constraint.description.8 = NOTE: This constraint is replaced by"I_19 - Name conflict" and thus disabled by default.\n\nThis rule checks that an element doesn't contain a naming conflict. Usually this means that two elements in the same container cannot have the same name, e.g. one cannot create two classes in a package and assign them identical names. Below we list the special cases:\n\nExchangeItems\nTwo exchange items that share a common container have conflicting names if both have the same name, and the order, number and type of their ExchangeItemElements is identical.

constraint.name.9 = I_09 - Exchanges Naming conflicts check 1
constraint.message.9 = {0}{1} content has a naming conflict for: {2}.
constraint.description.9 = This rule ensures that an element doesn't contain a naming conflict. This rule only applies to exchanges (Component Exchanges, Physical Links and Functional Exchanges) which have the same source (Component / function), the same target (Component / function) and the same name.

constraint.name.10 = I_10 - Unnamed Element
constraint.message.10 = {0} does not have a name.
constraint.description.10 = This rule checks that an element has a name and does not contain a naming conflict. This rule does not check ExchangeItemAllocations and DataValues.

constraint.name.11 = I_19 - Name conflict
constraint.message.11 = {0} contains {1} elements with conflicting names: {2}
constraint.description.11 = This rule Finds name conflicts.\n                    NOTE: This constraint include all Naming conflict detection and it is enabled by default.\n\nThis rule checks that an capella element doesn't contain any naming conflict. Usually this means that two elements in the same container cannot have the same name

constraint.name.12 = I_21 - Unique Model Element IDs
constraint.message.12 = The ID"{0}" of "{1}" collides with that of "{2}"
constraint.description.12 = This rule checks that all capella elements have a unique ID.

constraint.name.13 = I_25 - Description is well formed XML
constraint.message.13 = Description of"{0}" is not well formed: {1}
constraint.description.13 = This rule checks whether the description of a model element is well formed XML.

constraint.name.14 = I_31 - check Null Part
constraint.message.14 = [{0}] to {1} has a Null Part.
constraint.description.14 = This rule checks that a Component Exchange / Physical Link End doesn't have a part Null.

constraint.name.15 = I_32 - Check Component Exchange / Physical Link Ends in SingletonComponents mode
constraint.message.15 = Component Exchange / Physical Link Ends are dedicated to the reusable mode defined in Key Value"projectApproach".
constraint.description.15 = This rule ensures that Component Exchange / Physical Link Ends are restricted to reusable mode defined in Key Value"projectApproach".

constraint.name.16 = I_33 - Check  Reused Parts in SingletonComponents mode
constraint.message.16 = The type {0} ({1}) should not have multiple parts when the project approach is in default mode (not in reusable mode).
constraint.description.16 = This rule checks that reused parts are not used when the project approach is in default mode (not in reusable mode).

constraint.name.17 = I_36 - Check whether a Constraint is not used
constraint.message.17 = The constraint {0} is not used in the model{1}
constraint.description.17 = This rule checks that Constraints are used in the model.

constraint.name.18 = I_38 - Validate referential constraints
constraint.message.18 = ''{0}'' cannot reference ''{1}'' via ''{2}''
constraint.description.18 = Verifies that an elements outgoing references are valid according to Capella business rules.

constraint.name.19 = I_39 [Live] - Validate inter-model references
constraint.message.19 = ''{0}'' in model ''{1}'' cannot reference ''{2}'' in model ''{3}'' via ''{4}''
constraint.description.19 = An element in model A can only reference an element in model B if A has declared a "Library Reference" to B.

constraint.name.20 = DWF_D_25 - Dependency Cycle Detection
constraint.message.20 = Some dependency cycle(s) has(ve) been detected that implies the following packages: {0}
constraint.description.20 = This rule detects Cycle of Dependencies between packages.

constraint.name.21 = DWF_D_42 - Packages visibility problem
constraint.message.21 = Some packages visibility problem has been detected between {0} and {1}.
constraint.description.21 = This rule detects that it is impossible to create an association from Class1 to Class2 if Class2 is in package0, and Class1 in packag1 within package0.

constraint.name.22 = I_34 - Inter-model inconsistency Detection
constraint.message.22 = {0} inter-model inconsistency(ies) has(ve) been detected between models
constraint.description.22 = This rule detects inter-model inconsistencies (dependency violations and inter-model cycles).

constraint.name.23 = TJ_G_05 - Trace source and target naming
constraint.message.23 = The source"{0}" ({1}) traced a target model element with different name "{2}" ({3})
constraint.description.23 = This rule ensures that abstract trace's source and target element names are same.

constraint.name.24 = I_26 - Equivalent Trace Elements
constraint.message.24 = Message body provided by implementation
constraint.description.24 = Checks that there are no equivalent trace elements. Two trace elements are equivalent if they have identical types and identical source and target elements.

constraint.name.25 = I_45 - Typed Element has different name than its Type
constraint.message.25 = {0} ({1}) should have the same name as its type {2} ({3})
constraint.description.25 = This rule checks the Typed Element (Part, Exchange Item Instance) has the same name as its Type (Component, Exchange Item).

constraint.name.26 = I_40 - Equivalent Involvement Elements
constraint.message.26 = Message body provided by implementation
constraint.description.26 = Checks that there are no equivalent Involvement elements. Two Involvements elements are equivalent if they have identical types and identical source and target elements.