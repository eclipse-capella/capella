#Properties file for org.polarsys.capella.core.data.information.datatype.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = DWF_D_21 - DataType Pattern Validation
constraint.message = {0} value of {1} ({2}) is not a valide Regular Expression
constraint.description = This rule checks that the pattern of a data type is a Regular expression.

constraint.name.0 = DWF_D_22 - Boolean Type Incorrect literals values
constraint.message.0 = {0}(BooleanType) should not contain literals with same value.
constraint.description.0 = This rule ensures that a BooleanType can not have literals with same values.

constraint.name.1 = DWF_D_23 - NumericValue Unit Consistency
constraint.message.1 = {0}(NumericValue)  has a unit value which is not consistent with unit value of its type Length (PhysicalQuantity).
constraint.description.1 = This rule ensures that a NumericValue can not have an unit value different from the unit value of its type Length PhysicalQuantity.

constraint.name.2 = DWF_D_24 - DataValue Pattern Validation
constraint.description.2 = This rule checks that the value of the DataValue(LiteralNumericValue or LiteralStringValue) matches with the data type Regular expression.\n\n1) value of dataValue must be set.\n2) if dataValue typed, pattern should not be null.
constraint.message.2 = {0}