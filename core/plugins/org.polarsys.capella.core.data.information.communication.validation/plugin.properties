#Properties file for org.polarsys.capella.core.data.information.communication.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = DWF_I_09 - CommunicationLink kind and ExchangeItem kind
constraint.message = {0} (CommunicationLink) of kind [{1}] should only reference Exchange Item of kind [{2}] (current: {3} (ExchangeItem) [{4}])
constraint.description = This rule checks that a CommunicationLink kind is only used with  a specific CommunicatinLink protocol.

constraint.name.0 = DWF_I_10 - CommunicationLink protocol and  ExchangeItem kind
constraint.message.0 = {0} (CommunicationLink) of kind [{1}] should only have protocol of kind [{2}].
constraint.description.0 = This rule checks that a CommunicationLink protocol are only used with a specific CommunicatinLink kind.

constraint.name.1 = TC_I_04 - CommunicationLink kind and protocol realization check
constraint.message.1 = {0} (CommunicationLink) realizes a CommunicationLink from a previous level. It should have same protocol and kind than realized CommunicationLink.
constraint.description.1 = This rule checks that a CommunicationLink realizing a CommunicationLink has the same protocol and kind than the realized CommunicationLink.

constraint.name.2 = TC_I_05 - CommunicationLink exchange item check
constraint.message.2 = The {1} (ExchangeItem) is defined into {2} level and realized into the {3} level. {0} Component is linked to {1} ExchangeItem instead of be linked to realized ExchangeItem.
constraint.description.2 = This rule checks that a CommunicationLink isn't linked to an ExchangeItem from a previous level whereas it is realized in the same level than the CommunicationLink. CommunicationLink should be linked to the realized ExchangeItem.\nA warning can be raised if you have performed a transition of the Component before performing a transition of the linked ExchangeItem. \nYou should perform another transition of the Component from the lower level to use the realized ExchangeItem.