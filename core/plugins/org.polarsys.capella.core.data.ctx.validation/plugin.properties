constraint.name.15 = TJ_LA_06 - System Component Realized by Logical Component
constraint.message.15 = {0}
constraint.description.15 = This rule ensures that an System Component is realized by at least one Logical Component.

constraint.name.16 = TJ_SA_02 - System Component to Entity Realization
constraint.message.16 = {0}
constraint.description.16 = This rule ensures that a System Component Realizes at least one Entity.

constraint.name.17 = TJ_SA_04 - System Analysis Realization
constraint.message.17 = {0}.
