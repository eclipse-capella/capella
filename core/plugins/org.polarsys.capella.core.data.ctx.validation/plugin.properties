#Properties file for org.polarsys.capella.core.data.ctx.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = DWF_CA_01 - Capability location
constraint.message = {0} (Capability) can only be located in System Context.
constraint.description = This rule checks that an Capability can only be located in System Context.

constraint.name.0 = DWF_CA_02 - Capability self extension
constraint.message.0 = {0} (Capability) extends itself.
constraint.description.0 = This rule ensures that a capability cannot extend itself.

constraint.name.1 = DWF_CA_03 - Capability self generalization
constraint.message.1 = {0} (Capability) generalizes itself.
constraint.description.1 = This rule ensures that a capability cannot generalize itself.

constraint.name.2 = DWF_CA_04 - Capability self inclusion
constraint.message.2 = {0} (Capability) includes itself.
constraint.description.2 = This rule ensures that a capability does not include itself.

constraint.name.3 = DWF_CA_06 - Actor involvement in capabilities related to a mission in which it is involved check
constraint.message.3 = {0} is declared to be involved in {1} (Mission) but it is not involved in any of the exploited capabilities of {1} .
constraint.description.3 = This rule checks that the current Actor is involved with the Mission, and then involved in any of its Capabilities.

constraint.name.4 = DCOM_14 - Implemented interface delegation
constraint.message.4 = {0} (System) does not delegate its Implemented Interface {1}.
constraint.description.4 = This rule checks that a System delegates its Implemented Interface.

constraint.name.5 = DCOM_10 - Used interface delegation
constraint.message.5 = {0} (System) does not delegate its Used Interface {1}.
constraint.description.5 = This rule checks that a System delegates its used Interface

constraint.name.6 = DCOV_02 - Capability exploitation check
constraint.message.6 = {0} (Capability) is not exploited by any Mission.
constraint.description.6 = This rule checks that a Capability is exploited by at least one Mission.

constraint.name.7 = DCOV_03 - Mission capability exploitation test
constraint.message.7 = {0} (Mission) does not exploit any Capability.
constraint.description.7 = This rule checks that a Mission exploit at least one Capability.

constraint.name.8 = DCOV_04 - Mission involves an actor check
constraint.message.8 = {0} (Mission) does not involve any Actor.
constraint.description.8 = This rule checks that a Mission involves at least one actor.

constraint.name.9 = DCOV_05 - System Component involvement in a mission check
constraint.message.9 = {0} is not involved in {1} (Mission), although it is involved in {2}
constraint.description.9 = This rule checks that an System Component is involved in at least one Mission.

constraint.name.10 = DCOV_06 - System Component participation in capabilities minimal number
constraint.message.10 = {0} is not involved in any Capability.
constraint.description.10 = This rule checks that the minimum number of participation from a Component towards a Capability is one.

constraint.name.11 = DCOV_07 - Capability interation with actors
constraint.message.11 = {0} (Capability) does not involve any Actor.
constraint.description.11 = This rule checks that a Capability is involved by at least one Actor.

constraint.name.12 = DCOV_08 - System Component involvement in at least one scenario related to the capabilities it participates
constraint.message.12 = {0} is declared to be involved in {1} (Capability) but it does not appear in any of its Scenario(s).
constraint.description.12 = This rule checks that the current Component involved with capabilities appears in at least one scenario related to the capabilities it participates.

