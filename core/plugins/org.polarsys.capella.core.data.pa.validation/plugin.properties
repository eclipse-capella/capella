#Properties file for org.polarsys.capella.core.data.pa.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = TJ_EPBS_01 - Physical Architecture Realization
constraint.message = Realization consistency error for {0}.
constraint.description = This rule checks the realization consistency between physical architecture and EPBS architecture.

constraint.name.0 = DWF_DC_04 - Check multiple deployment
constraint.message.0 = {0} must be deployed only once.
constraint.description.0 = This rule depends on the Preference option "Multiple deployment allowed". If this option is set to false, the rule checks that a Behavior Physical Component is not deployed on more than one Node Physical Component.

constraint.name.1 = DWF_DC_20 - Physical Component Function Allocation check
constraint.message.1 = {0}
constraint.description.1 = This rule ensures that Physical Component of nature NODE does not allocate any Function.

constraint.name.2 = DWF_DC_21 - PhysicalComponent check deployment/containment of Sub-PhysicalComponents
constraint.message.2 = {0}
constraint.description.2 = This rule ensures that PC is correctly deploying/containing other child PC.\nNode Components (actor or not) can contain Node and deploy Node or Behavior.\nBehavior Components (actor or not) can contain Behavior and deploy behavior.\nNodePC=Physical Component of nature NODE\nBehaviourPC=Physical Component of nature BEHAVIOUR

constraint.name.3 = DWF_DC_22 - PhysicalComponent check deployment/containment in Parent-PhysicalComponent
constraint.message.3 = {0}
constraint.description.3 = This rule ensures that PC is correctly deployed/contained in parent PC.\nNODE PC cannot be deployed/contained by a  BEHAVIOUR PC\nBEHAVIOUR PC cannot be contained by a NODE PC

constraint.name.4 = DWF_DC_34 - PhysicalComponent of nature UNSET
constraint.message.4 = {0} has an invalid nature UNSET.
constraint.description.4 = This rule ensures that a Physical Component is not of nature UNSET, with the exceptions below, in which UNSET is allowed:\n                   1. Only root Actors (inside structure) can be nature UNSET\n                   2. The root Physical Component can be nature UNSET

constraint.name.5 = DWF_DC_39 - PhysicalSystem should be of nature UNSET
constraint.message.5 = {0} should be of nature UNSET.
constraint.description.5 = This rule ensures that the PhysicalSystem Component is of nature UNSET.

constraint.name.6 = DWF_DC_44 - Physical Component NODE/BEHAVIOUR is contained and deployed inside the same parent Component
constraint.message.6 = {0} (PhysicalComponent) of Nature {1} should not be contained and deployed in the same parent {2} (PhysicalComponent)
constraint.description.6 = This rule ensures that a Physical Component of nature NODE or BEHAVIOUR is not contained and deployed inside the same parent Component.

constraint.name.7 = TC_DC_13 - Root Physical Component Realization
constraint.message.7 = {0}.
constraint.description.7 = This rule ensures that Root Physical Component always realizes a Root Logical Component.

constraint.name.8 = TC_DC_09 - Physical Component Realization
constraint.message.8 = {0}
constraint.description.8 = This rule ensures that Physical Component always realizes a Logical Component.

constraint.name.9 = TJ_PA_06 - Physical component used and implemented interface check 1
constraint.message.9 = {0} should not implement / use / require / provide [{1}]Interface(s) of logical level which is/are not implemented / used / provided / required  by any of its realized Logical Components.
constraint.description.9 = This rule ensures that a Physical Component implements / uses a logical interface which is used / implemented / provided / required by its realized Logical Components. \n\nThis rule is only evaluated if the transition preference"Transit Interfaces handled by Components from context/logical layers to physical architecture" is disabled.

constraint.name.10 = TJ_PA_07 - Physical component used and implemented interface check 2
constraint.message.10 = {0} is not supposed to implement / use / provide / require an interface defined elsewhere than the physical architecture.
constraint.description.10 = This rule checks that a Physical Component implements / uses / provides / requires an interface of its own level. \n\nThis rule is only evaluated if the transition preference"Transit Interfaces handled by Components from context/logical layers to physical architecture" is enabled.

constraint.name.11 = TJ_PA_10 - Physical Actor to Logical Actor Realization
constraint.message.11 = {0}
constraint.description.11 = This rule ensures that a Physical Actor realizes at least one Logical Actor.

constraint.name.12 = TJ_PA_12 - Physical Architecture Realization
constraint.message.12 = {0}.
constraint.description.12 = This rule ensures the realization consistency between Physical Architecture and Logical Architecture.