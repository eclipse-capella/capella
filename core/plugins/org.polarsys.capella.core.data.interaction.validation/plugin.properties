#Properties file for org.polarsys.capella.core.data.interaction.validation
providerName = Eclipse.org
pluginName = Validation Plug-in

constraint.name = DWF_DS_01 - InteractionUse referenced scenario check
constraint.message = {0} (InteractionUse) do not reference any scenario.
constraint.description = This rule checks that an Interaction uses correctly references of a scenario.

constraint.name.0 = DWF_DS_02 - Role instance type check
constraint.message.0 = {0} (InstanceRole) is not correctly typed.
constraint.description.0 = This rule checks that an Instance Role is correctly typed.

constraint.name.1 = DWF_DS_03 - Scenario sequence message invoked operations check 1
constraint.message.1 = {0} (SequenceMessage) has an invalid invoked {1}.
constraint.description.1 = This rule checks that sequence messages have an invoked operation.

constraint.name.2 = DWF_DS_04 - Scenario sequence message invoked operations check 2
constraint.message.2 = {0} ({1}) in {2} ({3}) has an operation that doesn't fit implemented/provided and used/required interfaces.
constraint.description.2 = This rule checks that sequence messages have a correct invoked operation (sender shall use/require operation's interface and receiver shall implement/provide operation's interface).

constraint.name.3 = DWF_DS_05 - Scenario sequence messages justification check 1
constraint.message.3 = {0} (SequenceMessage) has no justification in sender/receiver Components terms in according with {1} (SequenceMessage).
constraint.description.3 = This rule checks that sequence messages are justified in sender/receiver Components terms between scenarios from different levels.

constraint.name.4 = DWF_DS_06 - Scenario sequence messages justification check 2
constraint.message.4 = {0} (SequenceMessage) has no justification in Operation terms in according with {1} (SequenceMessage).
constraint.description.4 = This rule checks that sequence messages are justified in Operation terms between scenarios from different levels.

constraint.name.5 = DWF_DS_07 - Sequence Messages not null invoked operation check
constraint.message.5 = {0} ({1}) in {2} ({3}) has a null invoked operation.
constraint.description.5 = This rule checks that Sequence Messages have a not null invoked operation.

constraint.name.6 = DWF_DS_08 - Ordering of interaction fragments
constraint.message.6 = {0} (Scenario) has an invalid ordering and may be corrupted.
constraint.description.6 = This rule checks that scenarios have a coherent ordering, i.e. finish of time lapses are after the corresponding beginning.

constraint.name.7 = DWF_DS_09 - Sequence message allocated exchange items
constraint.message.7 = {0} (SequenceMessage) allocates {1}(ExchangeItem) which {2} not allocated by invoked operation of current sequence message.
constraint.description.7 = This rule ensures that a sequence message does not allocate exchange items which are not allocated by invoked operation of sequence message.

constraint.name.8 = DWF_DS_10 - Consistency of Scenario Kind vs level
constraint.message.8 = Kind of the Scenario {0} is not allowed on this level or is UNSET.\nOn OA level, only INTERACTION Scenarios are allowed,\nOn SYS/LC/PC levels, only DATA_FLOW, INTERFACE and FUNCTIONAL Scenarii are allowed,\nOn EPBS level, only INTERFACE Scenarii are allowed.
constraint.description.8 = This rule checks the consistency between Scenario kind and Level:\nOn OA level, only INTERACTION Scenarios are allowed,\nOn SYS/LC/PC levels, only DATA_FLOW, INTERFACE and FUNCTIONAL Scenarii are allowed,\nOn EPBS level, only INTERFACE Scenarios are allowed.\nWhatever the level, UNSET Scenarios raise an error.

constraint.name.9 = DWF_DS_11 - Scenario branchs sequence messages order check
constraint.message.9 = {0} (SequenceMessage) has sender and reply branches inverted.
constraint.description.9 = This rule checks that sender and reply branches sequence messages are not inverted.

constraint.name.10 = DWF_DS_12 - Scenario sequence messages and operations / functional exchanges consistency
constraint.message.10 = {0} (SequenceMessage) should have the same name as {1} ({2}).
constraint.description.10 = This rule checks name consistency between operations / functional exchanges and sequence messages.

constraint.name.11 = DWF_DS_13 - Timer must be a reflexive message
constraint.message.11 = The timer sequence message {0} is not a reflexive message.
constraint.description.11 = This rule checks that an arm timer or cancel timer message is reflexive.

constraint.name.12 = DWF_DS_14 - A cancel timer must be within an arm timer
constraint.message.12 = The {0} cancel timer message must be within an arm timer message.
constraint.description.12 = This rule checks that a cancel timer message is within an arm timer message.

constraint.name.13 = DWF_DS_15 - a shared data READ must be within an execution
constraint.message.13 = the READ message between {0} and {1}  must be within an execution.
constraint.description.13 = This rule checks that a shared data READ is within an execution.

constraint.name.14 = DWF_DS_17 - A sequence message kind must be coherent with its transmission protocol
constraint.message.14 = The kind of the sequence message {0} must be coherent with its transmission protocol.
constraint.description.14 = This rule checks that a sequence message kind is coherent with its transmission protocol.

constraint.name.15 = DWF_DS_18 - OES/ES Sequence Messages consistency check
constraint.message.15 = {0} ({1}) in {2} ({3}) is inconsistent ({4}).
constraint.description.15 = This rule checks that Sequence Messages in OES or ES scenarios are consistent with their associated Component Exchange or Functional Exchange.

constraint.name.16 = DWF_DS_19 - OAS/FS Sequence Messages consistency check
constraint.message.16 = {0} ({1})  in {2} ({3}) is inconsistent ({4}).
constraint.description.16 = This rule checks that Sequence Messages in OAS or FS scenarios are consistent with their associated Functional Exchange.

constraint.name.17 = DWF_DS_20 - OES/ES State Fragments related function allocation consistency
constraint.message.17 = StateFragment related to {0} ({1}) is inconsistent in {2} ({3}) (related {1} is not allocated by associated {4} ({5}) or a sub{6} component).
constraint.description.17 = Check that the AbstractFunction related to the current StateFragment is allocated by the Component (or a sub Component) associated to the instance role.

constraint.name.18 = DWF_DS_21 - OES/ES State Fragments related Mode/State consistency
constraint.message.18 = StateFragment related to {0} ({1}) is inconsistent in {2} ({3}) (related {1} is not included in {4} ({5})).
constraint.description.18 = Check that the Mode/State related to the current StateFragment is contained by the Component associated to the instance role.

constraint.name.19 = DWF_DS_22 - OAS/FS AbstractFunction availability in Mode/State
constraint.message.19 = {0} ({1}) is an invalid choice for the {2} ({3}) because is not available in {4} ({5}).
constraint.description.19 = Check that the AbstractFunction associated to the instance role is available for the Mode/State related to the current StateFragment.

constraint.name.20 = DWF_DS_23 - Invalid referenced scenario
constraint.message.20 = {0} ({1}) in {2}({3}) [{4}] references an invalid scenario {5}({6}) [{7}]
constraint.description.20 = This rule checks that the interactionUse is referencing a Scenario that exists at the current Architectural Level.

constraint.name.21 = DWF_DS_24 - Instance role has different name compared to represented instance
constraint.message.21 = {0} ({1}) should have the same name as its represented instance {2} ({3})
constraint.description.21 = This rule checks that the Instance Role has the same name as its Represented Instance.

constraint.name.22 = DCOM_24 - Sequence Message conveys no Exchange Item compared to its Invoked Operation
constraint.message.22 = {0} (SequenceMessage) conveys no Exchange Item compared to its Invoked {1} ({2})
constraint.description.22 = This rule generates a warning if a Sequence Message has no Exchange Item while its Invoked Operation has some.

constraint.name.23 = DCOM_05 - Scenario Components Capability involvement check
constraint.message.23 = Message generated dynamically
constraint.description.23 = This rule checks that a Component which appears in a Scenario of a Capability is also involved in the Capability.

constraint.name.24 = TC_DS_01 - Scenario sequence messages order check
constraint.message.24 = "{0}" (SequenceMessage) has an invalid position according to refined message "{1}".
constraint.description.24 = This rule checks that sequence messages are correctly ordered between scenarios from different levels.

constraint.name.25 = TC_DS_02 - Scenario sequence messages unliked check
constraint.message.25 = {0} (SequenceMessage) has no justify by refinement tracability link with a sequenceMessage in {1} (Scenario).
constraint.description.25 = This rule checks that sequence messages are linked by refinement traceability between scenarios from different levels.

constraint.name.26 = TC_DS_03 - Scenario Realization Check
constraint.message.26 = {0}
constraint.description.26 = This rule checks that Scenario element is realized by below layer.\n\nExample:\nIf Scenario resides in SystemAnalysis layer. It should be relalized by a Scenario from Logical layer.

constraint.name.27 = DWF_UC_02 - Abstract Capability Realization Check
constraint.message.27 = {0}
constraint.description.27 = This rule checks that OperationalCapability/Capability/CapabilityRealization element is realized by below layer.\n\nExample:\nIf Capability resides in SystemAnalysis layer. It should be relalized by a CapabilityRealization from Logical layer.

constraint.name.28 = DWF_CA_07 - Capability check that all the involved Actors are present in at least one Operational Process or Functional Chain or Scenario related to the Capabilities it participates
constraint.message.28 = Message generated dynamically
constraint.description.28 = This rule checks if the involved Actors in the current Capability are present in at least one Operational Process or Functional Chain or Scenario.

constraint.name.29 = DWF_CA_08 - Capability check if the current Capability has Actors that are not involved but are present in at least one Operational Process or Functional Chain or Scenario related to the Capability
constraint.message.29 = Message generated dynamically
constraint.description.29 = This rule checks that if the current Capability has Actors that are not involved but are present in at least one Operational Process or Functional Chain or Scenario related to the Capability.

constraint.name.30 = DWF_CA_09 - Capability check if the current Capability has Functional Chains that are not involved but are related to the Capability
constraint.message.30 = Message generated dynamically
constraint.description.30 = This rule checks that if the current Capability has related Operational Processes or Functionals Chains that are not involved with the Capability.