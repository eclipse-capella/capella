constraint.description.7 = This rule checks that an existing technical interface between two Components represent all the Communication Links with the same direction between those two components.

constraint.name.8 = DWF_I_15 -  Exchange Item Allocation For Technical Interface Has Communication Link
constraint.message.8 = There is no corresponding communication link from component {0} to component {1} for the exchange item {2} that is allocated to interface {3}.
constraint.description.8 = This rule checks that for each Exchange Item Allocation of a technical Interface, there is a Communication Link associated to it.

constraint.name.9 = DWF_I_16 -  Technical interfaces are not provided or required
constraint.message.9 = {0} (Interface) can not be provided or required by components since it is a technical interface ({1}).
constraint.description.9 = This rule checks that technical interfaces are not provided or required

constraint.name.10 = DWF_I_17 - At most one technical interface between two components
