constraint.description.0 = This rule checks that the component cannot have the same kind of communication link targeting to the same exchange item with the same protocol.

constraint.name.1 = DWF_I_06 - Interface location check
constraint.message.1 = {0} (Interface Package) cannot be located under EPBS Architecture.
constraint.description.1 = This rule checks that no Interface is located in EPBS.

