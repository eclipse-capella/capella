constraint.name.5 = DWF_I_11 - ExchangeItemAllocation AllocatedItem Check
constraint.message.5 = {0}
constraint.description.5 = This rule checks that a ExchangeItemAllocation AllocatedItem value is not null.

constraint.name.6 = DWF_I_12 - Exchange item allocation layer consistency
constraint.message.6 = {0} (ExchangeItemAllocation) should not allocate {1} ({2}) of lower Architecture layer.
constraint.description.6 = This rule ensures that an ExchangeItemAllocation from given layer should not allocate element of lower Architecture layer.\n\nExmaple:\nIf an ExchangeItemAllocation is on SystemArchitecture layer. It should not allocate any element from Logical or Physical Layer.

constraint.name.7 = DWF_I_14 -  Technical interface represent all communication links
