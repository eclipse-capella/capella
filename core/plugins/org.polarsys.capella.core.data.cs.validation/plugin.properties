constraint.name.47 = TC_I_03 - Exchange item allocation check
constraint.message.47 = The {1} (ExchangeItem) is defined into {2} level and realized into the {3} level. {0} Interface allocates {1} ExchangeItem instead of allocating realized ExchangeItem.
constraint.description.47 = This rule checks that an Interface isn't linked to an ExchangeItem from a previous level whereas it is realized in the same level than the Interface.\nA warning can be raised if you have performed a transition of the Interface before performing a transition of the allocated ExchangeItem.\nYou should perform another transition of the Interface from the lower level to use the realized ExchangeItem. \nInterface should be linked to the realized ExchangeItem.

constraint.name.48 = DCOM_15 - Exchange item allocation consistency
constraint.message.48 = {0}
constraint.description.48 = This rule is applied to a Component \n 1) Checks that all Exchange Items allocated by its Interfaces are allocated to one of Function Ports of its allocated Functions.\n 2) Checks that all Exchange Items allocated by Function Ports of its allocated Functions are allocated to one of its Interfaces(used/implemented/provided/required).

constraint.name.49 = DCOM_16 - Interface Exchange item allocation consistency
constraint.message.49 = All exchange items allocated by {0} of {1} shall be allocated to one of functions ports of its allocated functions
constraint.description.49 = This rule is applied to an Interface and checks that all Exchange Items allocated by an Interface of a Component are allocated to one of Function Ports of its allocated Functions.

constraint.name.50 = DCOM_17 - Function Port Exchange item allocation consistency
constraint.message.50 = All exchange items allocated by {0} shall be allocated to one of Interfaces of {1}
constraint.description.50 = This rule is applied to a Function Port and checks that all Exchange Items allocated by a Function Port are allocated to one of Interfaces of its allocating Component

