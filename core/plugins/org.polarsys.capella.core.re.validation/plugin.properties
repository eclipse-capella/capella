#Properties file for org.polarsys.capella.core.re.validation
providerName = Eclipse.org
pluginName = Re Core Validation Plug-in

category.name = RPL Compliance

constraint.name = DCON_02 - RPL to REC conformance
constraint.message = {0} (RPL) is not up to date compared to its origin {1} (REC)
constraint.description = This rule checks if a RPL is up to date compared to its origin REC.

constraint.name.0 = DCON_04 - RPL/REC_RPL without REC
constraint.message.0 = {0} ({1}) without REC
constraint.description.0 = This rule checks if a RPL or REC_RPL has no REC.

constraint.name.1 = DCON_05 - REC might not have any RPL instance
constraint.message.1 = {0} ({1}) might not have any RPL instance
constraint.description.1 = This rule checks if a REC might not be utilised in a RPL.

constraint.name.2 = DCON_06 - REC_RPL might not have any RPL instance
constraint.message.2 = {0} ({1}) might not have any RPL instance
constraint.description.2 = This rule checks if a REC_RPL might not be utilised in a RPL.

constraint.name.3 = DCON_07 - RPL shall not reference an element of its REC
constraint.message.3 = {0} RPL shall not reference an element which is also referenced by its REC ({1})
constraint.description.3 = This rule checks if a RPL references an element which is also referenced by its REC

constraint.name.4 = DCON_08 - REC/RPL detect no source no target
constraint.message.4 = {0} {1}has {2}.
constraint.description.4 = This rule checks if a Catalog Element Link has target and source

constraint.name.5 = [Live] - Blackbox
constraint.message.5 = Modification of feature''{0}'' of element ''{1}'' violates BLACK_BOX RPL compliancy
constraint.description.5 = In live validation mode, the rule prevents all non REC conformant modifications on a RPL, with the exception that it is allowed to add realization links to RPL elements. In batch mode the rule verifies Blackbox compliance partially by checking that no external content was added to any of the validated RPLs elements (with the above mentioned exception for realization links).

constraint.name.6 = I_43 - Model Element shall not reference to aird element
constraint.message.6 = {0} {1}references to aird element.
constraint.description.6 = This rule checks if a model Element references aird element (e.g. gmf)