constraint.name.48 = TC_DF_01 - Component Exchange realization consistency
constraint.message.48 = {0} (Component Exchange) realizes a ComponentExchange from a previous level. Bounds of this Component Exchange should be consistent with definition from previous phase.\nA bound ComponentPort should realize the bound ComponentPort of the realized Component Exchange or be a delegated port of a realizing port.
constraint.description.48 = This rule checks that a Component Exchange realizing a Component Exchange from a previous level has bounds consistent with realized Component Exchange bounds.

constraint.name.49 = TC_DF_02 - Function port refinement check
constraint.message.49 = {0} (Function Port) isn't defined in a function or a sub-function realizing the function containing the port which has been realized.
constraint.description.49 = This rule generates a warning if a port isn't defined in a function or a sub-function realizing the function \ncontaining the port which has been realized.\nA warning can be raised if you have performed a drag and drop of the port to another function but this function is \nnot a sub-function of the function containing the port which has been realized and there is no traceability \nlink from the current function and the function containing the port which has been realized.\nYou should add manually a traceability link from the parent function of the realized port and the function \ncontaining the port which has been realized.

constraint.name.50 = TC_DF_03 - Functional chain involvement refinement check
constraint.message.50 = A FunctionalChainInvolvement with a tracability link to another FunctionalChainInvolvement involving a function \nshould involves a function or a sub-function realizing the involved function of the FunctionalChainInvolvement which has been realized.
constraint.description.50 = This rule generates a warning if a FunctionalChainInvolvement doesn't involves a function or a sub-function of the function which is involved by the FunctionalChainInvolvement which has been realized.

constraint.name.51 = TC_DF_04 - Component Exchange conveyed information check
constraint.message.51 = The {1} (ExchangeItem) is defined into {2} level and realized into the {3} level. {0} Component Exchange conveys {1} ExchangeItem\ninstead of conveying realized ExchangeItem.
constraint.description.51 = This rule checks that a Component Exchange conveying ExchangeItems doesn't convey an ExchangeItem from a previous level whereas it\nis realized in the same level than the Component Exchange. Component Exchange should convey the realized ExchangeItem.\nA warning can be raised if you have performed a transition of the Component Exchange before performing a transition of the conveyed ExchangeItem. \nYou should perform another transition of the Component Exchange from the lower level to use the realized ExchangeItem.

constraint.name.52 = TC_DF_05 - Functional exchange bounds refinement consistency check
constraint.message.52 = Both bounds of Functional Exchange should realize bounds of the realized FunctionalExchange.
constraint.description.52 = This rule generates a warning if a bound of the FunctionalExchange doesn't realize a bound of the realized FunctionalExchange.

constraint.name.53 = TC_DF_06 - Functional exchange bounds refinement check
constraint.message.53 = A bound of {0} (FunctionalExchange) isn't defined in a function or a sub-function realizing the function containing the bound of the realized FunctionalExchange.
constraint.description.53 = This rule generates a warning if a bound of FunctionalExchange isn't defined in a function or a sub-function\nof the function containing the bound which has been realized.\nA warning can be raised if you have performed a drag and drop of the bound to another function but this function \nis not a sub-function realizing the function containing the bound which has been realized and there is no \ntraceability link from the current function and the function containing the bound which has been realized.\nYou should add manually a traceability link from the parent function of the realized bound and the \nfunction containing the bound which has been realized.

constraint.name.54 = TC_DF_07 - Functional exchange conveyed exchange items check
constraint.message.54 = The {1} (ExchangeItem) is defined into {2} level and realized into the {3} level. {0} FunctionalExchange is linked to {1} \nExchangeItem instead of be linked to realized ExchangeItem.
constraint.description.54 = This rule checks that a FunctionalExchange isn't linked to an ExchangeItem from a previous level whereas it is realized in the same level than the FunctionalExchange. FunctionalExchange should be linked to the realized ExchangeItem.\nA warning can be raised if you have performed a transition of the FunctionalExchange before performing a transition of the linked ExchangeItem.\nYou should perform another transition of the FunctionalExchange from the lower level to use the realized ExchangeItem.

constraint.name.55 = TC_DF_08 - Function Kind consistency
constraint.message.55 = {0} ({1}) doesn't have same kind than realized Function {2} ({3}).
constraint.description.55 = This rule checks that a Function realizing a Function from a previous level has same kind.

constraint.name.56 = TC_DF_09 - Function kind condition consistency
constraint.message.56 = {0}
constraint.description.56 = The rule ensure that Funtion of kind ROUTE and SELECT can only have Condition set.

constraint.name.57 = TC_DF_10 - Function port realization check
constraint.message.57 = {0} (Function Port) shall be realized by a lower level function port.
constraint.description.57 = This rule generates a warning if a function port is not realized by a lower level function port.

constraint.name.58 = TC_DF_11 - Function port realization check
constraint.message.58 = {0} (Function Port) on {1} (Function) shall realize {2} (Function Port) on {3} (Function)
constraint.description.58 = This rule checks that considering a Function F1 containing this Function Port P1 that carries an Exchange Item E1.\nIf E1 is carried by another Function Port P2 contained by a Function F2 and F2 is realized by F1, then a warning is generated if P2 is not realized by P1.

constraint.name.59 = TC_DF_12 - Function port realization check
constraint.message.59 = {0} (Function Port) on {1} (Function) shall be realized by {2} (Function Port) on {3} (Function)
constraint.description.59 = This rule checks that considering a Function F1 containing this Function Port P1 that carries an Exchange Item E1.\nIf E1 is carried by another Function Port P2 contained by a Function F2 and F2 realizes F1, then a warning is generated if P2 doesn't realize P1.

constraint.name.60 = TC_DF_13 - Function port allocated exchange items check
constraint.message.60 = All exchange items allocated by {0} (FunctionPort) shall be allocated by one of its realizing function ports
constraint.description.60 = This rule verifies that all exchange items allocated by a function port are allocated by one of its realizing function ports.

constraint.name.61 = TC_DF_14 - Function port owner realization check
constraint.message.61 = {0} (Function} shall be realized by {1} (Function} : both contain a function port having a realization link between them
constraint.description.61 = This rule verifies that a realization link exists between two functions containing a function port having a realization link.

constraint.name.62 = TC_DF_15 - Root Function Realization
constraint.message.62 = {0} does not realize {1}.
constraint.description.62 = This rule ensures the realization consistency between Root Functions.

constraint.name.63 = TC_DC_05 - Component exchange bounds refinement consistency check
constraint.message.63 = Both bounds of Component Exchange should realize bounds of the realized ComponentExchange
constraint.description.63 = This rule generates a warning if a bound of the ComponentExchange doesn't realize a bound of the realized ComponentExchange.

constraint.name.64 = TC_DC_06 - Component Port Realization
constraint.message.64 = {0} (ComponentPort) realizes a ComponentPort from a previous level.\nIt should be consistent with definition from previous level: the ComponentPort should realize the ComponentPort\nor should be a delegated port of the realizing port.
constraint.description.64 = This rule checks that a Component Port realizing a Component Port from a previous level is contained into a Component realizing the Component which contains the realized port (or in a sub-component).

constraint.name.65 = TC_DC_07 - Component Functional Allocation
constraint.message.65 = The ComponentFunctionalAllocation realizes a ComponentFunctionalAllocation from a previous level.\nThe allocating component should realize the allocating component of the realized ComponentFunctionalAllocation\nor be contained by a realizing component. \nThe allocated function of the ComponentFunctionalAllocation should also realize the allocated \nfunction defined in the realized ComponentFunctionalAllocation or be a sub-function of a realizing function.
constraint.description.65 = The rule checks if ComponentFunctionalAllocation which realizes a ComponentFunctionalAllocation from a previous \nlevel has its allocated component and its allocating function related to the realized ComponentFunctionalAllocation\ncomponent and function.

constraint.name.66 = TC_DC_08 - Component Exchange Functional Exchange Allocation
constraint.message.66 = The ComponentExchangeFunctionalExchangeAllocation realizes a ComponentExchangeFunctionalExchangeAllocation from a previous level.\nThe allocating ComponentExchange should realize the allocating Component Exchange of the realized ComponentExchangeFunctionalExchangeAllocation.\nThe allocated FunctionalExchange of the ComponentExchangeFunctionalExchangeAllocation should also realize the allocated \nFunctionalExchange defined in the realized ComponentExchangeFunctionalExchangeAllocation.
constraint.description.66 = The rule checks if ComponentExchangeFunctionalExchangeAllocation which realizes a ComponentExchangeFunctionalExchangeAllocation \nfrom a previous level has its allocated Component Exchange and its allocating FunctionalExchange related to the realized\nComponentExchangeFunctionalExchangeAllocation ComponentExchange and FunctionalExchange.

constraint.name.67 = DWF_I_08 - Component port required and provided interface check
constraint.message.67 = {0} (Component port) is not supposed to provide / require an interface defined elsewhere than the physical architecture.
constraint.description.67 = This rule checks that a Component port requires/provides the interfaces of its own level.