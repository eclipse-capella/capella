providerName = Eclipse.org
pluginName = Capella Sirius Sirius Validation Plug-in

# Rules CO21 first resolver.
#
quickFix.I_22_Resolver.label = Update displayed text for related hyperlink(s)
quickFix.I_22_Resolver.desc = Update text of all related hyperlinks

quickFix.I_23_ConvertResolver.label = Convert to text related hyperlink(s)
quickFix.I_23_ConvertResolver.desc = Replace all related hyperlinks as text

quickFix.I_23_ReplaceWithCapellaElementResolver.label = Select a new Model Element
quickFix.I_23_ReplaceWithCapellaElementResolver.desc = Replace all hyperlinks with selected Model Element

quickFix.I_23_ReplaceWithDiagramElementResolver.label = Select a new Diagram
quickFix.I_23_ReplaceWithDiagramElementResolver.desc = Replace all hyperlinks with selected Diagram

quickFix.I_23_DeleteResolver.label = Remove related hyperlink(s)
quickFix.I_23_DeleteResolver.desc = Remove related hyperlink(s)

quickFix.ImagePath_Resolver.label = Select a new image
quickFix.ImagePath_Resolver.desc = Select a new image to replace the current non reachable one

quickFix.ImagePath_RemoveResolver.label = Remove missing image
quickFix.ImagePath_RemoveResolver.descRichText = Remove missing image from rich text description
quickFix.ImagePath_RemoveResolver.descDiagram = Remove broken reference to image from diagram

quickFix.ImagePath_MassResolver.label = Change all image paths
quickFix.ImagePath_MassResolver.desc = Replace the first segments of image paths by new ones for diagram nodes and rich text description.

constraint.name = I_07 - Diagram Naming conflicts check
constraint.message = {0}"{1}" content has a naming conflict for: {2}.
constraint.description = This rule checks  that a diagram doesn't contain naming conflict with other diagrams of the same type.

constraint.name.0 = I_22 - Hyperlink to Model Element or Diagram displayed text check
constraint.message.0 = {0}
constraint.description.0 = This rule ensures that displayed text of hyperlinks to Model Element or Diagram is up to date.

constraint.name.1 = I_23 - Hyperlink to Model Element or Diagram existance check
constraint.message.1 = {0}
constraint.description.1 = This rule ensures that hyperlinks to Model Element or Diagram are still refering to existing elements.

constraint.name.2 = I_46 - Check that the image used for diagram nodes is found
constraint.message.2 = {0}
constraint.description.2 = Warning: This rule applies on diagrams elements of diagram associated to the Capella element and will load the diagram. \nIt is recommended to uncheck this rule by default.\n\nThis rule ensures that images, used as background of diagram elements, can be found.\n\nTip: If some cases are detected (validation markers), it is recommended to check the existence of the image and move it in the right folder according to the used expected image path location. Once done, you can restart the validation. If you have still validation markers, then use the "Quick fix" tool to select a new image.

constraint.name.3 = I_47 - Check that images used in rich text is found (Capella and diagram descriptions etc)
constraint.message.3 = {0}
constraint.description.3 = This rule ensures that images, used in rich text editor, for attributes such as Capella elements description or diagram description, can be found.\n\nTip: If some cases are detected (validation markers), it is recommended to check the existence of the image and move it in the right folder according to the used expected image path location. Once done, you can restart the validation. If you have still validation markers, then use the"Quick fix" tool to select a new image or remove those images from the description.